name: Production CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Check TypeScript Warnings/Errors
      run: npm run typecheck
      # Ensure there are 0 TypeScript errors before allowing merge

    - name: Build Next.js Application
      run: npm run build
      env:
        # Provide dummy variables or test environment keys if Next build requires them
        NEXT_PUBLIC_BASE_URL: "test.odresnuevos.org"
