name: Automate Firebase Firestore Backup

on:
  schedule:
    # Runs every Sunday at 02:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Export Firestore Data
        run: |
          # The GCP_PROJECT_ID and GCP_BUCKET_NAME secrets must be configured in GitHub
          gcloud firestore export gs://${{ secrets.GCP_BUCKET_NAME }}/backups/$(date +'%Y-%m-%d') --project=${{ secrets.GCP_PROJECT_ID }}
